<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediCare Plus</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f3f3f3;
        }

        .auth-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .auth-left {
            width: 50%;
            background: #efefef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .auth-left img {
            width: 700px;
            max-width: 80%;
            margin-bottom: 25px;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
            text-align: center;
        }

        .brand-text .main {
            color: #2d84a3;
        }

        .brand-text .plus {
            color: #ef2f4f;
        }

        .auth-right {
            width: 50%;
            background: #0a6ebd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
        }

        .switch-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 45px;
            justify-content: center;
        }

        .switch-btn {
            min-width: 124px;
            padding: 14px 22px;
            border-radius: 10px;
            border: 1px solid #fff;
            text-align: center;
            font-size: 18px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .switch-btn.active {
            background: #efefef;
            color: #0a6ebd;
            font-weight: bold;
        }

        .switch-btn.inactive {
            background: transparent;
            color: #fff;
        }

        .form-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 36px;
            text-align: left;
            line-height: 1.2;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #fff;
        }

        .form-control {
            width: 100%;
            height: 44px;
            border: 1px solid #222;
            background: #efefef;
            padding: 10px 14px;
            font-size: 16px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: #efefef;
            color: #0a6ebd;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            margin-top: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .message-box {
            margin-top: 18px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            min-height: 22px;
        }

        @media(max-width:900px) {
            .auth-wrapper {
                flex-direction: column;
            }

            .auth-left,
            .auth-right {
                width: 100%;
                min-height: 50vh;
            }

            .brand-text {
                font-size: 48px;
            }

            .form-title {
                text-align: center;
                font-size: 28px;
            }

            .name-row {
                grid-template-columns: 1fr;
            }
        }

        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .custom-modal-content {
            background: #fff;
            padding: 25px 30px;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            position: relative;
        }

        .close-popup {
            position: absolute;
            right: 12px;
            top: 8px;
            cursor: pointer;
            font-size: 22px;
        }

        .custom-modal h3 {
            color: #0a6ebd;
            margin-bottom: 10px;
        }

        .custom-modal p {
            color: #333;
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-left">
            <img src="logo.png" alt="MediCare Plus Logo">
        </div>

        <div class="auth-right">
            <div class="auth-card">
                <div class="switch-buttons">
                    <a href="login.html" class="switch-btn inactive">Login</a>
                    <a href="register.html" class="switch-btn active">Register</a>
                </div>

                <h1 class="form-title">Create your patient account</h1>

                <form id="registerForm">
                    <div class="name-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email *</label>
                        <input type="email" id="registerEmail" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password *</label>
                        <input type="password" id="registerPassword" class="form-control" required>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>
                </form>

                <a href="index.html" class="back-link">← Back to Home</a>
                <div id="registerMessage" class="message-box"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const firstName = document.getElementById("firstName").value.trim();
            const lastName = document.getElementById("lastName").value.trim();
            const email = document.getElementById("registerEmail").value.trim();
            const password = document.getElementById("registerPassword").value.trim();
            const fullName = firstName + " " + lastName;

            const formData = new URLSearchParams();
            formData.append("name", fullName);
            formData.append("email", email);
            formData.append("password", password);
            formData.append("role", "patient");

            fetch("../backend/register.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData.toString()
            })
                .then(res => res.text())
                .then(response => {
                    const msg = document.getElementById("registerMessage");

                    if (response.toLowerCase().includes("already")) {
                        showPopup("Registration Error", "This email is already registered in the system.");
                        return;
                    }

                    if (response.toLowerCase().includes("successfully") || response.toLowerCase().includes("registered")) {
                        msg.style.color = "#ffffff";
                        msg.innerText = "Patient account created successfully.";
                        document.getElementById("registerForm").reset();

                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 1200);
                    } else {
                        msg.style.color = "#ffd6d6";
                        msg.innerText = response;
                    }
                })
                .catch(() => {
                    const msg = document.getElementById("registerMessage");
                    msg.style.color = "#ffd6d6";
                    msg.innerText = "Something went wrong. Please try again.";
                });
        });
    </script>
    <script>
        function showPopup(title, message) {
            document.getElementById("popupTitle").innerText = title;
            document.getElementById("popupMessage").innerText = message;
            document.getElementById("popupModal").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("popupModal").style.display = "none";
        }

        window.onclick = function (event) {
            const modal = document.getElementById("popupModal");
            if (event.target === modal) {
                closePopup();
            }
        };
    </script>

    <div id="popupModal" class="custom-modal">
        <div class="custom-modal-content">
            <span class="close-popup" onclick="closePopup()">&times;</span>
            <h3 id="popupTitle"></h3>
            <p id="popupMessage"></p>
        </div>
    </div>

</body>

</html>

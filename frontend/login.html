<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare Plus</title>
    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f3f3f3;
        }

        .auth-wrapper{
            display:flex;
            min-height:100vh;
            width:100%;
        }

        .auth-left{
            width:50%;
            background:#efefef;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:40px;
        }

        .auth-left img{
            width:700px;
            max-width:80%;
            margin-bottom:25px;
        }

        .brand-text{
            font-size:64px;
            font-weight:bold;
            line-height:1;
            text-align:center;
        }

        .brand-text .main{
            color:#2d84a3;
        }

        .brand-text .plus{
            color:#ef2f4f;
        }

        .auth-right{
            width:50%;
            background:#0a6ebd;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px;
        }

        .auth-card{
            width:100%;
            max-width:420px;
        }

        .switch-buttons{
            display:flex;
            gap:12px;
            margin-bottom:55px;
            justify-content:center;
        }

        .switch-btn{
            min-width:124px;
            padding:14px 22px;
            border-radius:10px;
            border:1px solid #fff;
            text-align:center;
            font-size:18px;
            text-decoration:none;
            transition:0.3s ease;
        }

        .switch-btn.active{
            background:#efefef;
            color:#0a6ebd;
            font-weight:bold;
        }

        .switch-btn.inactive{
            background:transparent;
            color:#fff;
        }

        .form-title{
            font-size:34px;
            font-weight:700;
            margin-bottom:42px;
            text-align:left;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:10px;
            font-size:16px;
            color:#fff;
        }

        .form-control{
            width:100%;
            height:46px;
            border:1px solid #222;
            background:#efefef;
            padding:10px 14px;
            font-size:16px;
            outline:none;
        }

        .submit-btn{
            width:180px;
            height:44px;
            border:none;
            border-radius:10px;
            background:#efefef;
            color:#0a6ebd;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            display:block;
            margin:30px auto 14px auto;
            transition:0.3s ease;
        }

        .submit-btn:hover{
            transform:translateY(-2px);
            opacity:0.95;
        }

        .back-link{
            display:block;
            text-align:center;
            color:#fff;
            text-decoration:none;
            font-size:16px;
            margin-top:8px;
        }

        .back-link:hover{
            text-decoration:underline;
        }

        .message-box{
            margin-top:18px;
            text-align:center;
            font-size:15px;
            font-weight:600;
            min-height:22px;
        }

        @media(max-width:900px){
            .auth-wrapper{
                flex-direction:column;
            }

            .auth-left,
            .auth-right{
                width:100%;
                min-height:50vh;
            }

            .brand-text{
                font-size:48px;
            }

            .form-title{
                text-align:center;
                font-size:30px;
            }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-left">
        <img src="logo.png" alt="MediCare Plus Logo">
    </div>

    <div class="auth-right">
        <div class="auth-card">
            <div class="switch-buttons">
                <a href="login.html" class="switch-btn active">Login</a>
                <a href="register.html" class="switch-btn inactive">Register</a>
            </div>

            <h1 class="form-title">Login to your account</h1>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Username</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <a href="index.html" class="back-link">← Back to Home</a>
            <div id="loginMessage" class="message-box"></div>
        </div>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new URLSearchParams();
    formData.append("email", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);

    fetch("../backend/login.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("loginMessage");

        if(data.status === "success"){
            localStorage.setItem("user", JSON.stringify(data.user));
            msg.style.color = "#ffffff";
            msg.innerText = "Login successful";

            if(data.user.role === "admin"){
                window.location.href = "admin.html";
            }else if(data.user.role === "doctor"){
                window.location.href = "doctor.html";
            }else{
                window.location.href = "patient.html";
            }
        }else{
            msg.style.color = "#ffd6d6";
            msg.innerText = data.message || "Invalid email or password";
        }
    })
    .catch(() => {
        const msg = document.getElementById("loginMessage");
        msg.style.color = "#ffd6d6";
        msg.innerText = "Something went wrong. Please try again.";
    });
});
</script>

</body>
</html>
